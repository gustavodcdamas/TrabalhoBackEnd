version: '3.8'
services:
  #backend:
  #  image: agencia-backend
  #  container_name: agencia-backend
  #  ports:
  #    - "3535:3535"
  #  volumes:
  #    - ./uploads:/usr/src/app/uploads
  redis:
    image: redis:latest
    container_name: redis
    env_file: .env
    command: redis-server --requirepass StrongPassword!
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres
    env_file: .env
    container_name: postgres
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  redis_data:
  pg_data:

